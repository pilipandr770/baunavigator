<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BauNavigator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box {
      background: #1e293b; border-radius: 12px; border: 1px solid #334155;
      padding: 40px 36px; width: 100%; max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .box-logo { text-align: center; margin-bottom: 28px; }
    .box-logo .ico { font-size: 36px; }
    .box-logo h1 { font-size: 18px; color: #f1f5f9; margin: 10px 0 4px; }
    .box-logo p { font-size: 12px; color: #475569; margin: 0; letter-spacing: .5px; text-transform: uppercase; }
    .form-label { color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 6px; }
    .form-control { background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 6px; padding: 10px 12px; width: 100%; box-sizing: border-box; font-size: 14px; }
    .form-control:focus { outline: none; border-color: #3b82f6; }
    .btn-login { width: 100%; background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .15s; }
    .btn-login:hover { background: #2563eb; }
    .flash-danger { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;min-width:280px;">
        {% for category, message in messages %}
          <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  <div class="box">
    <div class="box-logo">
      <div class="ico">⚙</div>
      <h1>BauNavigator</h1>
      <p>Admin Panel</p>
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="margin-bottom:16px;">
        <label class="form-label">Passwort</label>
        <input type="password" name="password" class="form-control" required autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Anmelden</button>
    </form>
  </div>
</body>
</html>
