{% extends "base.html" %}
{% block title %}Registrieren — BauNavigator{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⌂</div>
      <div class="auth-logo-name">BauNavigator</div>
      <div class="auth-logo-sub">Konto erstellen</div>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Vollständiger Name <span class="req">*</span></label>
        <input type="text" name="full_name" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">E-Mail <span class="req">*</span></label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Passwort <span class="req">*</span></label>
        <input type="password" name="password" class="form-control" required minlength="8">
        <div class="form-hint">Mindestens 8 Zeichen</div>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">Konto erstellen</button>
    </form>
    <p class="text-center mt-16 text-small text-muted">
      Bereits registriert? <a href="{{ url_for('auth.login') }}">Anmelden</a>
    </p>
  </div>
</div>
{% endblock %}
