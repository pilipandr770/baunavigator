{% extends 'provider_admin/base.html' %}
{% block title %}Passwort ändern — {{ provider.company_name }}{% endblock %}
{% block page_title %}Passwort ändern{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <form method="post" class="pa-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h3>Passwort ändern</h3>
    <div style="margin-bottom:14px;">
      <label class="form-label">Aktuelles Passwort</label>
      <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
    </div>
    <div style="margin-bottom:14px;">
      <label class="form-label">Neues Passwort</label>
      <input type="password" name="new_password" class="form-control" required minlength="8" autocomplete="new-password">
      <small style="color:#9ca3af;font-size:11px;">Mindestens 8 Zeichen</small>
    </div>
    <div style="margin-bottom:20px;">
      <label class="form-label">Neues Passwort bestätigen</label>
      <input type="password" name="confirm_password" class="form-control" required minlength="8" autocomplete="new-password">
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary">Passwort ändern</button>
      <a href="{{ url_for('provider_admin.dashboard') }}" class="btn btn-secondary">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
