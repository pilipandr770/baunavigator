<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BauNavigator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { background: #f8fafc; }
    .legal-nav {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; gap: 16px;
    }
    .legal-nav a { text-decoration: none; }
    .legal-brand { font-weight: 800; font-size: 16px; color: #2563eb; display: flex; align-items: center; gap: 6px; margin-right: auto; }
    .legal-nav-link { font-size: 13px; color: #64748b; padding: 5px 10px; border-radius: 6px; }
    .legal-nav-link:hover { background: #f1f5f9; color: #0f172a; }
    .legal-wrap { max-width: 820px; margin: 48px auto; padding: 0 24px 80px; }
    .legal-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 48px 52px; }
    .legal-card h1 { font-size: 28px; font-weight: 800; color: #0f172a; margin-bottom: 6px; letter-spacing: -.4px; }
    .legal-card .legal-date { font-size: 12px; color: #94a3b8; margin-bottom: 36px; }
    .legal-card h2 { font-size: 17px; font-weight: 700; color: #0f172a; margin: 32px 0 10px; }
    .legal-card h3 { font-size: 14px; font-weight: 600; color: #374151; margin: 20px 0 6px; }
    .legal-card p  { font-size: 14px; color: #374151; line-height: 1.75; margin-bottom: 12px; }
    .legal-card ul, .legal-card ol { padding-left: 22px; margin-bottom: 12px; }
    .legal-card li { font-size: 14px; color: #374151; line-height: 1.75; margin-bottom: 4px; }
    .legal-card a  { color: #2563eb; }
    .legal-card table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    .legal-card th, .legal-card td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
    .legal-card th { background: #f8fafc; font-weight: 600; color: #374151; }
    .legal-card .legal-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; font-size: 13px; color: #0369a1; }
    @media (max-width: 600px) {
      .legal-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
<nav class="legal-nav">
  <a href="{{ url_for('dashboard.index') }}" class="legal-brand"><span>⌂</span> BauNavigator</a>
  <a href="{{ url_for('legal.impressum') }}" class="legal-nav-link">Impressum</a>
  <a href="{{ url_for('legal.agb') }}" class="legal-nav-link">AGB</a>
  <a href="{{ url_for('legal.datenschutz') }}" class="legal-nav-link">Datenschutz</a>
</nav>
<div class="legal-wrap">
  <div class="legal-card">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
